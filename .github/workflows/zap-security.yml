name: zap-security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-static:
    name: ZAP API (static OpenAPI)
    runs-on: ubuntu-latest
    if: vars.ZAP_API_SERVER_URL != ''
    env:
      OPENAPI_SERVER_URL: ${{ vars.ZAP_API_SERVER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export OpenAPI file
        run: npm run openapi:export

      - name: Run ZAP API scan (static)
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: "openapi/openapi.json"
          format: "openapi"
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: "zap/rules-api.conf"
          fail_action: false
          artifact_name: "zap-api-static-reports"

  api-dynamic:
    name: ZAP API (dynamic staging URL)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && vars.ZAP_API_TARGET != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP API scan (dynamic)
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: "${{ vars.ZAP_API_TARGET }}"
          format: "openapi"
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: "zap/rules-api.conf"
          fail_action: false
          artifact_name: "zap-api-dynamic-reports"
