name: zap-security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-local:
    name: ZAP API (local CI app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start app
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/openapi.json > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run ZAP API scan
        run: |
          docker run --rm -t --network host \
            -v "${PWD}:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -f openapi \
            -t http://127.0.0.1:3000/openapi.json \
            -r zap-api-local-report.html \
            -x zap-api-local-report.xml \
            -J zap-api-local-report.json \
            -c /zap/wrk/zap/rules-api.conf

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-local-reports
          path: |
            zap-api-local-report.html
            zap-api-local-report.xml
            zap-api-local-report.json
            app.log
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
